<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inmobiliaria CM – Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #1a2e4a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .brand-icon {
      font-size: 2.6rem;
      color: #1a2e4a;
    }
    .btn-login {
      background: #1a2e4a;
      border-color: #1a2e4a;
      color: #fff;
      font-weight: 600;
    }
    .btn-login:hover {
      background: #2e4a6e;
      border-color: #2e4a6e;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand-icon"><i class="bi bi-building"></i></div>
      <h5 class="fw-bold mt-2 mb-0">Inmobiliaria CM</h5>
      <small class="text-muted">Sistema de gestión de arriendos</small>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Nombre de usuario" autofocus required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control"
                 placeholder="Contraseña" required>
        </div>
      </div>
      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-login btn-lg">
          <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
        </button>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
